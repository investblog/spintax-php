name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: PHP ${{ matrix.php }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.0', '8.1', '8.2', '8.3', '8.4']

    steps:
      - uses: actions/checkout@v4

      # The golden corpus is the cross-engine contract, shared with @spintax/core (TypeScript) and
      # the WordPress plugin. It is checked out rather than vendored: a copy would drift, and a
      # drifting contract is not a contract.
      - name: Check out the golden corpus
        uses: actions/checkout@v4
        with:
          repository: investblog/spintax-js
          path: .corpus

      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: mbstring
          coverage: none
          tools: composer

      - name: Install dependencies
        run: composer install --no-progress --prefer-dist

      - name: Test
        run: vendor/bin/phpunit
        env:
          SPINTAX_FIXTURES: ${{ github.workspace }}/.corpus/packages/conformance/fixtures
